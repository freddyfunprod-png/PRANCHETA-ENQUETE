<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arco — Pesquisa de Ferramentas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #534AB7;
      --accent-l: #EEEDFE;
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --text: #1a1a18;
      --text2: #666660;
      --text3: #aaaaaa;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 10px;
      --radius-lg: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #252523;
        --text: #f0f0ec;
        --text2: #aaaaaa;
        --text3: #666660;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    #app { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .progress-bar { height: 5px; background: var(--bg2); border-radius: 99px; margin-bottom: 20px; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 22px 18px; }
    .tag { display: inline-block; border-radius: 6px; padding: 3px 10px; font-size: 11px; font-weight: 600; margin-bottom: 14px; border: 1px solid; }
    .question { font-size: 16px; font-weight: 500; line-height: 1.5; margin-bottom: 16px; }
    .hint { font-size: 11px; color: var(--text2); margin-bottom: 14px; margin-top: -10px; }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .opt-btn { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--bg2); font-size: 13px; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text); }
    .opt-btn.selected { border-color: var(--opt-color, var(--accent)); background: var(--opt-bg, var(--accent-l)); color: var(--opt-color, var(--accent)); font-weight: 600; }
    .opt-check { width: 18px; height: 18px; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; font-weight: 700; color: #fff; transition: all 0.15s; }
    .opt-btn.selected .opt-check { background: var(--opt-color, var(--accent)); border-color: var(--opt-color, var(--accent)); }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn { padding: 12px; border-radius: var(--radius); border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-secondary { flex: 1; background: transparent; border: 0.5px solid var(--border2); color: var(--text2); }
    .btn-secondary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary { flex: 2; background: var(--accent); color: #fff; }
    .btn-primary:disabled { background: var(--bg2); color: var(--text3); cursor: not-allowed; }
    .btn-full { width: 100%; background: var(--accent); color: #fff; padding: 13px; border-radius: var(--radius); border: none; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-outline { width: 100%; background: transparent; color: var(--text2); padding: 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; margin-top: 8px; }
    .dots { display: flex; gap: 4px; justify-content: center; margin-top: 14px; }
    .dot { height: 6px; border-radius: 99px; background: var(--bg2); transition: all 0.2s; }
    input, select { width: 100%; font-size: 13px; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); margin-bottom: 14px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 5px; }
    .roles { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .role-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .role-btn.active { border-color: var(--accent); background: var(--accent-l); color: var(--accent); font-weight: 600; }
    .err { font-size: 12px; color: #A32D2D; background: #FCEBEB; border-radius: 7px; padding: 8px 12px; margin-bottom: 14px; }
    .metric-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
    .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
    .metric-label { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
    .metric-val { font-size: 26px; font-weight: 600; }
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { font-size: 12px; padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-weight: 400; transition: all 0.15s; }
    .tab.active { border-color: var(--accent); background: var(--accent-l); color: var(--accent); font-weight: 600; }
    .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 14px; }
    .bar-row { margin-bottom: 8px; }
    .bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 3px; }
    .bar-track { height: 6px; background: var(--bg2); border-radius: 99px; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
    .verdict-item { display: flex; gap: 12px; align-items: flex-start; background: var(--bg2); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 9px; }
    .verdict-score { font-size: 20px; font-weight: 700; flex-shrink: 0; }
    .user-row { display: flex; gap: 12px; align-items: center; background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; cursor: pointer; border: 0.5px solid var(--border); transition: border-color 0.15s; }
    .user-row:hover { border-color: var(--accent); }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .empty { text-align: center; padding: 2.5rem; background: var(--bg2); border-radius: var(--radius-lg); color: var(--text2); }
    .badge { display: inline-block; border-radius: 5px; padding: 2px 8px; font-size: 10px; font-weight: 600; border: 1px solid; margin-bottom: 8px; }
    .back-btn { font-size: 12px; color: var(--accent); background: transparent; border: none; cursor: pointer; margin-bottom: 14px; padding: 0; }
    .user-detail-header { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
    .spinner { text-align: center; padding: 3rem; color: var(--text2); }
    .config-warning { background: #FAEEDA; border: 1px solid #EF9F27; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 20px; font-size: 12px; color: #633806; line-height: 1.6; }
    .setup-step { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; font-size: 13px; color: var(--text); }
    .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────────────────
//  ⚙️  CONFIG — paste your Supabase credentials here
// ─────────────────────────────────────────────────────────
const CFG = {
  supabaseUrl: 'YOUR_SUPABASE_URL',        // e.g. https://xyzabc.supabase.co
  supabaseKey: 'YOUR_SUPABASE_ANON_KEY',   // your anon/public key
  adminPassword: 'arco2025'               // password to access /admin
};
// ─────────────────────────────────────────────────────────

const ACCENT = '#534AB7';
const blockColors = { 'Perfil':'#534AB7','Gestão':'#0F6E56','Comunicação':'#993C1D','Tecnologia':'#3C3489' };
const blockBgs    = { 'Perfil':'#EEEDFE','Gestão':'#E1F5EE','Comunicação':'#FAECE7','Tecnologia':'#E6F1FB' };

const QUESTIONS = [
  { block:'Perfil', id:1, text:'Quantas pessoas trabalham no seu escritório?', type:'single',
    options:['Só eu (freelancer)','2 a 5 pessoas','6 a 20 pessoas','Mais de 20 pessoas'] },
  { block:'Perfil', id:2, text:'Quantos projetos ativos você gerencia ao mesmo tempo?', type:'single',
    options:['1 a 3','4 a 8','9 a 15','Mais de 15'] },
  { block:'Gestão', id:3, text:'Como você gerencia seus projetos hoje?', type:'single',
    options:['Planilha (Excel / Google Sheets)','Ferramenta genérica (Trello, Monday, Notion)','Software específico para arquitetura','Papel / WhatsApp / Email'] },
  { block:'Gestão', id:4, text:'Suas maiores dores na gestão de projetos? (até 3)', type:'multi',
    options:['Perder prazo por falta de visibilidade','Não saber quanto fee já foi consumido','Dificuldade de delegar tarefas','Falta de histórico de decisões','Retrabalho por falta de comunicação'] },
  { block:'Gestão', id:5, text:'Com que frequência projetos consomem mais do que o fee previsto?', type:'single',
    options:['Raramente (< 10%)','Às vezes (10–30%)','Frequentemente (30–60%)','Quase sempre (> 60%)'] },
  { block:'Comunicação', id:6, text:'Como é a comunicação interna do escritório?', type:'single',
    options:['WhatsApp','Email','Slack ou Teams','Não tenho ferramenta dedicada'] },
  { block:'Comunicação', id:7, text:'Maior problema de comunicação no escritório?', type:'multi',
    options:['Informação espalhada em vários lugares','Difícil rastrear decisões e aprovações','Cliente não responde feedbacks a tempo','Time não sabe o status do projeto','Arquivos desatualizados por email'] },
  { block:'Tecnologia', id:8, text:'Já tentou usar software específico para arquitetura?', type:'single',
    options:['Sim, uso e estou satisfeito','Sim, mas abandonei — era complicado','Sim, mas era muito caro','Não, nunca tentei'] },
  { block:'Tecnologia', id:9, text:'Um app móvel completo faria diferença no seu dia a dia?', type:'single',
    options:['Essencial — trabalho muito fora do escritório','Seria útil mas não é prioridade','Prefiro desktop','Indiferente'] },
  { block:'Tecnologia', id:10, text:'Quanto pagaria por uma solução completa e fácil?', type:'single',
    options:['Até R$50/user/mês','R$50–R$120/user/mês','R$120–R$250/user/mês','Pagaria se resolver — preço é secundário'] },
];

// ── Supabase helpers ──────────────────────────────────────
const isConfigured = () => CFG.supabaseUrl !== 'YOUR_SUPABASE_URL';

async function sbInsert(data) {
  const r = await fetch(`${CFG.supabaseUrl}/rest/v1/responses`, {
    method: 'POST',
    headers: { 'apikey': CFG.supabaseKey, 'Authorization': `Bearer ${CFG.supabaseKey}`,
                'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}

async function sbCheckEmail(email) {
  const r = await fetch(`${CFG.supabaseUrl}/rest/v1/responses?email=eq.${encodeURIComponent(email)}&select=id`, {
    headers: { 'apikey': CFG.supabaseKey, 'Authorization': `Bearer ${CFG.supabaseKey}` }
  });
  const data = await r.json();
  return data.length > 0;
}

async function sbGetAll() {
  const r = await fetch(`${CFG.supabaseUrl}/rest/v1/responses?select=*&order=created_at.desc`, {
    headers: { 'apikey': CFG.supabaseKey, 'Authorization': `Bearer ${CFG.supabaseKey}` }
  });
  return r.json();
}

// ── State ─────────────────────────────────────────────────
let STATE = {
  view: location.hash === '#admin' ? 'admin-login' : 'register',
  user: null, answers: {}, current: 0,
  adminTab: 'aggregate', selectedUser: null,
  responses: [], loading: false, err: ''
};

function setState(patch) { STATE = { ...STATE, ...patch }; render(); }

// ── Helpers ───────────────────────────────────────────────
function initials(name) { return (name||'').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase(); }
function pctOf(n, total) { return total ? Math.round(n / total * 100) : 0; }
function countOpt(all, id, opt) { return all.filter(r => { try { const a = typeof r.answers === 'string' ? JSON.parse(r.answers) : r.answers; return (a[id]||[]).includes(opt); } catch { return false; } }).length; }

function calcVerdict(all) {
  if (!all.length) return [];
  const c = (id, opt) => countOpt(all, id, opt);
  const p = n => pctOf(n, all.length);
  return [
    { icon:'📱', title:'App móvel é essencial', score: p(c(9,'Essencial — trabalho muito fora do escritório')), desc: s => `${s}% dizem que app móvel é essencial. Prioridade #1.` },
    { icon:'💸', title:'Fee tracking é dor real', score: p(c(4,'Não saber quanto fee já foi consumido')), desc: s => `${s}% não controlam consumo do fee. Módulo financeiro crítico.` },
    { icon:'⚠️', title:'Estouro de budget frequente', score: p(c(5,'Frequentemente (30–60%)')+c(5,'Quase sempre (> 60%)')), desc: s => `${s}% enfrentam estouro de fee. Alerta em tempo real é diferencial.` },
    { icon:'💬', title:'WhatsApp domina a comunicação', score: p(c(6,'WhatsApp')), desc: s => `${s}% usam WhatsApp para trabalho. Chat integrado tem enorme mercado.` },
    { icon:'📊', title:'Planilha ainda é o padrão', score: p(c(3,'Planilha (Excel / Google Sheets)')), desc: s => `${s}% usam planilha. Mercado subdigitalizado — oportunidade clara.` },
    { icon:'🔁', title:'Complexidade afasta usuários', score: p(c(8,'Sim, mas abandonei — era complicado')), desc: s => `${s}% abandonaram softwares por complexidade. Onboarding simples vence.` },
    { icon:'📁', title:'Informação fragmentada', score: p(c(7,'Informação espalhada em vários lugares')), desc: s => `${s}% sofrem com info espalhada. Centralização é o core value.` },
  ].filter(i => i.score > 0).sort((a,b) => b.score - a.score).slice(0,5).map(i => ({ ...i, desc: i.desc(i.score) }));
}

// ── Render ────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const views = { register: renderRegister, survey: renderSurvey, thanks: renderThanks,
                  'admin-login': renderAdminLogin, admin: renderAdmin };
  app.innerHTML = (views[STATE.view] || renderRegister)();
  bindEvents();
}

// ── Register ──────────────────────────────────────────────
function renderRegister() {
  const roles = ['Arquiteto(a)','Sócio(a) / Diretor(a)','Coordenador(a)','Estagiário(a)','Outro'];
  const warning = !isConfigured() ? `
    <div class="config-warning">
      <strong>⚙️ Configure o Supabase antes de usar</strong><br>
      Abra o <code>index.html</code>, encontre a seção <code>CONFIG</code> no topo do script e preencha<br>
      <code>supabaseUrl</code> e <code>supabaseKey</code> com suas credenciais.
    </div>` : '';
  return `
    <div style="padding-top:1.5rem">
      <div class="logo">arco</div>
      <div class="sub" style="margin-bottom:24px">Pesquisa de ferramentas para escritórios de arquitetura</div>
      ${warning}
      <div class="card">
        <div style="font-size:16px;font-weight:600;margin-bottom:4px">Antes de começar</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:18px">Seus dados identificam sua resposta. Não enviamos emails.</div>
        <label>Nome completo</label>
        <input id="f-name" type="text" placeholder="Ex: Ana Müller" value="${STATE.fName||''}"/>
        <label>Email profissional</label>
        <input id="f-email" type="email" placeholder="Ex: ana@escritorio.com.br" value="${STATE.fEmail||''}"/>
        <label>Nome do escritório</label>
        <input id="f-office" type="text" placeholder="Ex: Müller Arquitetura" value="${STATE.fOffice||''}"/>
        <label>Seu cargo</label>
        <div class="roles">
          ${roles.map(r => `<button class="role-btn${STATE.fRole===r?' active':''}" data-role="${r}">${r}</button>`).join('')}
        </div>
        ${STATE.err ? `<div class="err">${STATE.err}</div>` : ''}
        <button class="btn-full" id="btn-start" ${!isConfigured()?'disabled':''}>Começar pesquisa →</button>
        <button class="btn-outline" id="btn-admin-login">Ver resultados (admin)</button>
      </div>
    </div>`;
}

// ── Survey ────────────────────────────────────────────────
function renderSurvey() {
  const q = QUESTIONS[STATE.current];
  const color = blockColors[q.block];
  const bg = blockBgs[q.block];
  const sel = STATE.answers[q.id] || [];
  const prog = Math.round((STATE.current / QUESTIONS.length) * 100);
  const isCircle = q.type === 'single';
  return `
    <div style="padding-top:1.5rem">
      <div class="header">
        <div class="logo">arco</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(STATE.user.name)}</div>
          <span style="font-size:12px;color:var(--text2)">${STATE.current+1} / ${QUESTIONS.length}</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${prog}%;background:${color}"></div>
      </div>
      <div class="tag" style="background:${bg};color:${color};border-color:${color}44">${q.block}</div>
      <div class="card">
        <div class="question">${q.text}</div>
        ${q.type==='multi'?'<div class="hint">Selecione todas que se aplicam</div>':''}
        <div class="options">
          ${q.options.map(opt => {
            const isSel = sel.includes(opt);
            return `<button class="opt-btn${isSel?' selected':''}" data-opt="${opt}"
              style="--opt-color:${color};--opt-bg:${bg}">
              <span class="opt-check" style="border-radius:${isCircle?'50%':'3px'}">${isSel?'✓':''}</span>
              ${opt}
            </button>`;
          }).join('')}
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="btn-prev" ${STATE.current===0?'disabled':''}>← Anterior</button>
          <button class="btn btn-primary" id="btn-next" ${!sel.length?'disabled':''}>
            ${STATE.current+1===QUESTIONS.length?'Enviar ✓':'Próxima →'}
          </button>
        </div>
      </div>
      <div class="dots">
        ${QUESTIONS.map((_,i)=>`<div class="dot" style="width:${i===STATE.current?18:6}px;background:${i<=STATE.current?color:'var(--bg2)'}"></div>`).join('')}
      </div>
    </div>`;
}

// ── Thanks ────────────────────────────────────────────────
function renderThanks() {
  return `
    <div style="padding-top:3rem;text-align:center;max-width:440px;margin:0 auto">
      <div class="logo" style="margin-bottom:20px">arco</div>
      <div style="font-size:36px;margin-bottom:14px">✅</div>
      <div style="font-size:17px;font-weight:600;margin-bottom:6px">Obrigado, ${STATE.user.name.split(' ')[0]}!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:28px">Sua resposta foi salva. Ela vai ajudar a construir o Arco.</div>
      <button class="btn-full" id="btn-go-admin">Ver resultados e veredicto →</button>
      <button class="btn-outline" id="btn-new-resp">Nova resposta (outro usuário)</button>
    </div>`;
}

// ── Admin Login ───────────────────────────────────────────
function renderAdminLogin() {
  return `
    <div style="padding-top:3rem;max-width:400px;margin:0 auto">
      <div class="logo" style="margin-bottom:4px">arco</div>
      <div class="sub" style="margin-bottom:28px">Painel de resultados</div>
      <div class="card">
        <div style="font-size:15px;font-weight:600;margin-bottom:14px">Acesso restrito</div>
        <label>Senha</label>
        <input id="f-pwd" type="password" placeholder="••••••••"/>
        ${STATE.err?`<div class="err">${STATE.err}</div>`:''}
        <button class="btn-full" id="btn-admin-enter">Entrar →</button>
        <button class="btn-outline" id="btn-back-survey">← Voltar à pesquisa</button>
      </div>
    </div>`;
}

// ── Admin Panel ───────────────────────────────────────────
function renderAdmin() {
  const { responses, adminTab, selectedUser, loading } = STATE;
  if (loading) return `<div class="spinner">Carregando dados...</div>`;

  const verdict = calcVerdict(responses);
  const total = responses.length;
  const offices = [...new Set(responses.map(r=>r.office))].length;

  if (adminTab === 'user-detail' && selectedUser) return renderUserDetail(selectedUser);

  return `
    <div style="padding-top:1.5rem">
      <div class="header" style="margin-bottom:16px">
        <div>
          <div class="logo">arco</div>
          <div class="sub">Painel de resultados</div>
        </div>
        <button class="btn-outline" id="btn-new-resp" style="width:auto;padding:7px 14px;font-size:12px">+ Nova resposta</button>
      </div>
      <div class="metric-grid">
        <div class="metric"><div class="metric-label">Respostas</div><div class="metric-val" style="color:${ACCENT}">${total}</div></div>
        <div class="metric"><div class="metric-label">Escritórios</div><div class="metric-val" style="color:#0F6E56">${offices}</div></div>
        <div class="metric"><div class="metric-label">Insights</div><div class="metric-val" style="color:#993C1D">${verdict.length}</div></div>
      </div>
      <div class="tab-row">
        <button class="tab${adminTab==='aggregate'?' active':''}" data-tab="aggregate">Agregado</button>
        <button class="tab${adminTab==='users'?' active':''}" data-tab="users">Por usuário</button>
        <button class="tab${adminTab==='verdict'?' active':''}" data-tab="verdict">Veredicto</button>
      </div>
      ${total===0 ? `<div class="empty"><div style="font-size:28px;margin-bottom:10px">📭</div><div>Nenhuma resposta ainda.</div></div>`
        : adminTab==='aggregate' ? renderAggregate(responses)
        : adminTab==='users'     ? renderUsers(responses)
        : renderVerdict(verdict) }
    </div>`;
}

function renderAggregate(responses) {
  return QUESTIONS.map(q => {
    const color = blockColors[q.block];
    const bg = blockBgs[q.block];
    const total = responses.length;
    return `
      <div class="result-card">
        <div class="badge" style="background:${bg};color:${color};border-color:${color}33">${q.block}</div>
        <div style="font-size:13px;font-weight:500;margin-bottom:12px">${q.text}</div>
        ${q.options.map(opt => {
          const n = countOpt(responses, q.id, opt);
          const p = pctOf(n, total);
          return `<div class="bar-row">
            <div class="bar-meta"><span>${opt}</span><span style="font-weight:600;color:${p>=50?color:'var(--text2)'}">${p}% <span style="font-weight:400;color:var(--text3)">(${n})</span></span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${p>=50?color:color+'55'}"></div></div>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function renderUsers(responses) {
  return responses.map((r,i) => `
    <div class="user-row" data-user-idx="${i}">
      <div class="avatar">${initials(r.name)}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${r.name}</div>
        <div style="font-size:11px;color:var(--text2)">${r.role} · ${r.office}</div>
      </div>
      <div style="font-size:11px;color:var(--text3)">${new Date(r.created_at).toLocaleDateString('pt-BR')}</div>
      <div style="font-size:14px;color:var(--text3)">→</div>
    </div>`).join('');
}

function renderUserDetail(r) {
  const answers = typeof r.answers === 'string' ? JSON.parse(r.answers) : r.answers;
  return `
    <div style="padding-top:1.5rem">
      <button class="back-btn" id="btn-back-users">← Voltar à lista</button>
      <div class="user-detail-header">
        <div class="avatar" style="width:40px;height:40px;font-size:14px">${initials(r.name)}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${r.name}</div>
          <div style="font-size:12px;color:var(--text2)">${r.role} · ${r.office}</div>
          <div style="font-size:11px;color:var(--text3)">${r.email} · ${new Date(r.created_at).toLocaleDateString('pt-BR')}</div>
        </div>
      </div>
      ${QUESTIONS.map(q => {
        const color = blockColors[q.block];
        const bg = blockBgs[q.block];
        const ans = answers[q.id] || [];
        return `<div class="result-card" style="margin-bottom:10px">
          <div class="badge" style="background:${bg};color:${color};border-color:${color}33">${q.block}</div>
          <div style="font-size:12px;font-weight:500;margin-bottom:8px">${q.text}</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${ans.length ? ans.map(a=>`<span style="background:${bg};color:${color};border:1px solid ${color}33;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600">${a}</span>`).join('')
                         : `<span style="font-size:12px;color:var(--text3)">Não respondida</span>`}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderVerdict(verdict) {
  const borderColors = ['#D85A30','#EF9F27',ACCENT,ACCENT,ACCENT];
  const labels = ['🔥 Prioridade máxima','⚡ Alta prioridade',''];
  if (!verdict.length) return `<div class="empty">Dados insuficientes para gerar veredicto.</div>`;
  return verdict.map((v,i) => `
    <div class="verdict-item" style="border-left:3px solid ${borderColors[i]||ACCENT}">
      <div style="font-size:20px">${v.icon}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">${labels[i]?labels[i]+' — ':''}${v.title}</div>
        <div style="font-size:12px;color:var(--text2)">${v.desc}</div>
      </div>
      <div class="verdict-score" style="color:${borderColors[i]||ACCENT}">${v.score}%</div>
    </div>`).join('');
}

// ── Events ────────────────────────────────────────────────
function bindEvents() {
  const $ = id => document.getElementById(id);

  // Register
  const btnStart = $('btn-start');
  if (btnStart) btnStart.onclick = async () => {
    const name  = ($('f-name')||{}).value?.trim();
    const email = ($('f-email')||{}).value?.trim().toLowerCase();
    const office= ($('f-office')||{}).value?.trim();
    const role  = STATE.fRole;
    if (!name||!email||!office||!role) return setState({ err:'Preencha todos os campos.' });
    if (!/\S+@\S+\.\S+/.test(email)) return setState({ err:'Email inválido.' });
    setState({ err:'', loading:true });
    try {
      const dup = await sbCheckEmail(email);
      if (dup) return setState({ loading:false, err:'Este email já respondeu a pesquisa.' });
    } catch {}
    setState({ loading:false, user:{ name, email, office, role }, view:'survey', answers:{}, current:0 });
  };

  // Admin login button from register
  const btnAdminLogin = $('btn-admin-login');
  if (btnAdminLogin) btnAdminLogin.onclick = () => setState({ view:'admin-login', err:'' });

  // Role buttons
  document.querySelectorAll('.role-btn').forEach(b => {
    b.onclick = () => setState({ fRole: b.dataset.role,
      fName: ($('f-name')||{}).value, fEmail: ($('f-email')||{}).value, fOffice: ($('f-office')||{}).value });
  });

  // Preserve input values on re-render
  ['f-name','f-email','f-office'].forEach(id => {
    const el = $(id);
    if (el) el.oninput = () => {
      if (id==='f-name') STATE.fName = el.value;
      if (id==='f-email') STATE.fEmail = el.value;
      if (id==='f-office') STATE.fOffice = el.value;
    };
  });

  // Survey options
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.onclick = () => {
      const q = QUESTIONS[STATE.current];
      const opt = b.dataset.opt;
      let ans = { ...STATE.answers };
      if (q.type==='single') ans[q.id] = [opt];
      else {
        const prev = ans[q.id]||[];
        ans[q.id] = prev.includes(opt) ? prev.filter(o=>o!==opt) : [...prev, opt];
      }
      setState({ answers: ans });
    };
  });

  const btnPrev = $('btn-prev');
  if (btnPrev) btnPrev.onclick = () => setState({ current: STATE.current - 1 });

  const btnNext = $('btn-next');
  if (btnNext) btnNext.onclick = async () => {
    if (STATE.current + 1 < QUESTIONS.length) { setState({ current: STATE.current + 1 }); return; }
    setState({ loading: true });
    try {
      await sbInsert({ name: STATE.user.name, email: STATE.user.email,
        office: STATE.user.office, role: STATE.user.role, answers: STATE.answers });
    } catch(e) { console.error('Save error:', e); }
    setState({ loading: false, view: 'thanks' });
  };

  // Thanks
  const btnGoAdmin = $('btn-go-admin');
  if (btnGoAdmin) btnGoAdmin.onclick = () => { loadAdmin(); };

  // New response
  document.querySelectorAll('#btn-new-resp').forEach(b => {
    b.onclick = () => setState({ view:'register', user:null, answers:{}, current:0, fName:'', fEmail:'', fOffice:'', fRole:'', err:'' });
  });

  // Admin login
  const btnAdminEnter = $('btn-admin-enter');
  if (btnAdminEnter) btnAdminEnter.onclick = () => {
    const pwd = ($('f-pwd')||{}).value;
    if (pwd !== CFG.adminPassword) return setState({ err:'Senha incorreta.' });
    loadAdmin();
  };

  const btnBackSurvey = $('btn-back-survey');
  if (btnBackSurvey) btnBackSurvey.onclick = () => setState({ view:'register', err:'' });

  // Admin tabs
  document.querySelectorAll('.tab').forEach(b => {
    b.onclick = () => setState({ adminTab: b.dataset.tab, selectedUser: null });
  });

  // User rows
  document.querySelectorAll('.user-row').forEach(b => {
    b.onclick = () => {
      const idx = parseInt(b.dataset.userIdx);
      setState({ adminTab:'user-detail', selectedUser: STATE.responses[idx] });
    };
  });

  const btnBackUsers = $('btn-back-users');
  if (btnBackUsers) btnBackUsers.onclick = () => setState({ adminTab:'users', selectedUser:null });
}

async function loadAdmin() {
  setState({ view:'admin', loading:true, adminTab:'aggregate' });
  try {
    const data = await sbGetAll();
    setState({ responses: data||[], loading:false });
  } catch(e) {
    setState({ responses:[], loading:false });
  }
}

// Init
render();
</script>
</body>
</html>
